<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Salma!</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        .birthday-container {
            background-color: #e0f2fe;
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 0;
            bottom: 0;
            right: 0;
            left: 0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* Styling Gift Box */
        .gift-section {
            text-align: center;
            cursor: pointer;
            transition: all 0.5s ease;
        }

        .gift-box {
            font-size: 120px;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-block;
        }

        .gift-box:hover {
            transform: scale(1.2) rotate(10deg);
        }

        .text-ucapan {
            color: #fb7185;
            font-weight: bold;
            font-size: clamp(1.5rem, 5vh, 3rem);
            margin: 5px 0;
        }

        .click-text {
            color: #fb7185;
            margin-top: 20px;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }

        /* Styling Terminal */
        .terminal-box {
            display: none; /* Sembunyi di awal */
            background-color: rgba(255, 255, 255, 0.8);
            color: #374151;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            width: 90%;
            max-width: 500px;
            min-height: 250px;
            text-align: left;
            font-weight: bold;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2em;
            background-color: #000000;
            margin-left: 5px;
            vertical-align: middle;
            animation: blink 0.8s infinite;
        }

        /* Animasi */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Class untuk animasi keluar kado */
        .bounce-out {
            animation: bounce-out-anim 0.5s forwards;
        }

        @keyframes bounce-out-anim {
            0% { transform: scale(1); }
            25% { transform: scale(1.2); }
            100% { transform: scale(0); opacity: 0; }
        }

        .line {
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .highlight {
            color: #ff0404;
            font-weight: bold;
        }

        /* Kontainer untuk foto-foto di pinggir */
        .box-foto {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Agar tidak menghalangi klik pada kado */
        }

        .box-foto img {
            position: absolute;
            width: 180px; /* Sesuaikan ukuran foto */
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            object-fit: cover;
        }

        /* Posisi Foto di Kiri */
        .foto-kiri-1 { top: 5%; left: 2%; }
        .foto-kiri-2 { top: 35%; left: 2%; }
        .foto-kiri-3 { bottom: 5%; left: 2%; }

        /* Posisi Foto di Kanan */
        .foto-kanan-1 { top: 5%; right: 2%; }
        .foto-kanan-2 { top: 35%; right: 2%; }
        .foto-kanan-3 { bottom: 5%; right: 2%; }

        /* Responsif untuk HP agar foto tidak menabrak teks */
        @media (max-width: 768px) {
            .box-foto img {
                width: 80px;
            }
        }

    </style>
</head>
<body>

<div class="birthday-container">
    <!-- Tampilan Kado -->
    <div id="giftSection" class="gift-section" onclick="openGift()">
        <p class="text-ucapan">HAPPY 20TH BIRTHDAY🎉❤️</p>
        <p class="text-ucapan">SALMA TSANIATUL MUNAWAROH🥰</p>
        <p class="text-ucapan">14 April 2026</p>
        <div class="gift-box">🎁</div>
        <p class="click-text">Ada kado untukmu, klik untuk buka! ❤️</p>
    </div>
    <!-- Tampilan Terminal -->
    <div id="terminalBox" class="terminal-box">
        <div id="messageContainer"></div>
        <div id="typingLine" class="line" style="display: none;">
            <span id="currentText"></span><span class="cursor"></span>
        </div>
    </div>
    <div class="box-foto">
        <img src="image/img1.jpeg" class="foto-kiri-1" alt="foto1">
        <img src="image/img3.jpeg" class="foto-kiri-2" alt="foto2">
        <img src="image/img2.jpeg" class="foto-kiri-3" alt="foto3">

        <img src="image/img6.jpeg" class="foto-kanan-1" alt="foto4">
        <img src="image/img4.jpeg" class="foto-kanan-2" alt="foto5">
        <img src="image/img5.jpeg" class="foto-kanan-3" alt="foto6">
    </div>
</div>

<script>
    const nama = "Sayangku"; 
    const pesan = [
        `Halo ${nama}!`,
        "Hari ini adalah hari yang sangat spesial buat kamuuu...",
        "Aku cuma mau bilang...",
        "SELAMAT ULANG TAHUN SAYANGG! 🎂",
        "Semoga kamu selalu diberikan kesehatan dan selalu dilancarkan terus rezekinya SAYANG...❤️",
        "Maaf kalo akuu selalu bikin kamuu marah dengan setiap pertanyaan akuu, dan maaf juga kalo akuu selalu memperlihatkan sifat cemburu akuu kemarin kemarin meskipun akuu gatau kamu sadar atau engga disetiap akuu memperlihatkan sipat cemburu akuu. Dan maaf juga kalo akuu selalu buat kamuu kecewa sayanggg, akuu janji bakal berubah jadi lebih baik lagi buat kedepannya, ayoo kita jalani ini bersama sama lagi yahhh sayang dan kalo ada apa apa jangan lupa ceritain ke akuu sayanggg karena akuu akan selalu ada buat kamuuu...❤️",
        "Bahagia selalu sayanggg...❤️",
        "I WILL ALWAYS LOVE YOU SAYANG❤️",
    ];

    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    async function openGift() {
        const giftSection = document.getElementById('giftSection');
        const terminalBox = document.getElementById('terminalBox');

        // Animasi kado menghilang
        giftSection.classList.add('bounce-out');
        
        await sleep(500);
        giftSection.style.display = 'none';
        
        // Munculkan terminal
        terminalBox.style.display = 'block';
        setTimeout(() => {
            terminalBox.style.opacity = '1';
        }, 50);

        startTyping();
    }

    async function startTyping() {
        const messageContainer = document.getElementById('messageContainer');
        const typingLine = document.getElementById('typingLine');
        const currentTextSpan = document.getElementById('currentText');

        await sleep(800);
        typingLine.style.display = 'block';

        for (let i = 0; i < pesan.length; i++) {
            const fullLine = pesan[i];
            currentTextSpan.innerText = "";
            
            for (let j = 0; j < fullLine.length; j++) {
                currentTextSpan.innerText += fullLine[j];
                await sleep(70); 
            }
            
            // Pindahkan teks yang selesai diketik ke kontainer utama
            const newLine = document.createElement('div');
            newLine.className = 'line';
            if (fullLine.includes('🎂')) {
                newLine.classList.add('highlight');
            }
            newLine.innerText = fullLine;
            messageContainer.appendChild(newLine);
            
            currentTextSpan.innerText = "";
            await sleep(500); 
        }
        
        typingLine.style.display = 'none';
    }
</script>

</body>
</html>
